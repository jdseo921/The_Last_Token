<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="790" viewBox="0 0 1060 790" font-family="Arial, Helvetica, sans-serif">
  <rect width="1060" height="790" fill="#0e0a20"/>
  <text x="40" y="40" font-size="24" font-weight="bold" fill="#ffcf6b">PIXEL HAVEN — Rough Floor Plan</text>
  <text x="40" y="60" font-size="12" fill="#8f9ec0">Structure-first layout (FNAF-1 style): central hub · front-of-house public loop · gated back-of-house. Visuals/NPCs dressed later.</text>

  <!-- ============ CONNECTIONS (drawn behind boxes) ============ -->
  <g stroke="#4a6a96" stroke-width="3" fill="none">
    <line x1="530" y1="150" x2="530" y2="180"/>            <!-- FrontEntrance-Hub -->
    <line x1="192" y1="223" x2="232" y2="223"/>            <!-- Restrooms-Party -->
    <line x1="428" y1="223" x2="432" y2="223"/>            <!-- Party-Hub -->
    <line x1="628" y1="223" x2="632" y2="223"/>            <!-- Hub-CabinetRow -->
    <line x1="330" y1="266" x2="330" y2="300"/>            <!-- Party-Prize -->
    <line x1="730" y1="266" x2="730" y2="300"/>            <!-- CabinetRow-Snack -->
    <line x1="428" y1="343" x2="632" y2="343"/>            <!-- Prize-Snack (loop bottom) -->
  </g>
  <g stroke="#8a4a6a" stroke-width="3" fill="none">
    <line x1="628" y1="471" x2="632" y2="471"/>            <!-- Maintenance-Workshop -->
    <line x1="628" y1="591" x2="632" y2="591"/>            <!-- StaffCorridor-MemoryCore -->
  </g>

  <!-- ============ GATES (red dashed) ============ -->
  <g stroke="#ff5a6a" stroke-width="3" stroke-dasharray="7 6" fill="none">
    <line x1="530" y1="266" x2="530" y2="428"/>           <!-- Hub -> Maintenance -->
    <line x1="530" y1="514" x2="530" y2="548"/>           <!-- Maintenance -> StaffCorridor -->
    <line x1="530" y1="634" x2="530" y2="668"/>           <!-- StaffCorridor -> StaffRoom -->
  </g>
  <!-- back-of-house divider -->
  <line x1="150" y1="404" x2="828" y2="404" stroke="#ff5a6a" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5"/>
  <text x="150" y="398" font-size="12" font-weight="bold" fill="#ff7a86">▼ BACK OF HOUSE — staff only, progressively gated</text>
  <g font-size="10.5" fill="#ff9aa4">
    <text x="332" y="300">gate: circuit_soda_completed</text>
    <text x="540" y="536">gate: staff_corridor_unlocked</text>
    <text x="540" y="656">gate: memory_echo_completed</text>
  </g>

  <!-- ============ ROOM BOXES ============ -->
  <!-- helper style: front = indigo #1e2a4a / steel; back = plum #2a1830 / magenta; NEW = amber border -->

  <!-- Front Entrance (NEW) -->
  <g>
    <rect x="432" y="64" width="196" height="86" rx="10" fill="#1e2a4a" stroke="#f2a640" stroke-width="2.5"/>
    <rect x="580" y="70" width="42" height="18" rx="4" fill="#f2a640"/>
    <text x="601" y="83" font-size="11" font-weight="bold" fill="#241400" text-anchor="middle">NEW</text>
    <text x="530" y="92" font-size="15" font-weight="bold" fill="#eef0fb" text-anchor="middle">FRONT ENTRANCE</text>
    <text x="530" y="114" font-size="10.5" fill="#9fb0d0" text-anchor="middle">wake point · locked exit</text>
    <text x="530" y="130" font-size="10.5" fill="#9fb0d0" text-anchor="middle">arcade history · closing notice</text>
  </g>

  <!-- Restrooms (NEW, small) -->
  <g>
    <rect x="40" y="180" width="152" height="86" rx="10" fill="#1e2a4a" stroke="#f2a640" stroke-width="2.5"/>
    <rect x="146" y="186" width="42" height="18" rx="4" fill="#f2a640"/>
    <text x="167" y="199" font-size="11" font-weight="bold" fill="#241400" text-anchor="middle">NEW</text>
    <text x="116" y="208" font-size="14" font-weight="bold" fill="#eef0fb" text-anchor="middle">RESTROOMS</text>
    <text x="116" y="230" font-size="10.5" fill="#9fb0d0" text-anchor="middle">mirror foreshadow</text>
    <text x="116" y="246" font-size="10.5" fill="#9fb0d0" text-anchor="middle">(two signals) · secret</text>
  </g>

  <!-- Party Room (NEW) -->
  <g>
    <rect x="232" y="180" width="196" height="86" rx="10" fill="#1e2a4a" stroke="#f2a640" stroke-width="2.5"/>
    <rect x="380" y="186" width="42" height="18" rx="4" fill="#f2a640"/>
    <text x="401" y="199" font-size="11" font-weight="bold" fill="#241400" text-anchor="middle">NEW</text>
    <text x="330" y="208" font-size="15" font-weight="bold" fill="#eef0fb" text-anchor="middle">PARTY ROOM</text>
    <text x="330" y="230" font-size="10.5" fill="#9fb0d0" text-anchor="middle">community photos · lore</text>
    <text x="330" y="246" font-size="10.5" fill="#9fb0d0" text-anchor="middle">birthday high-score (opt)</text>
  </g>

  <!-- Arcade Hub (central, highlighted) -->
  <g>
    <rect x="432" y="180" width="196" height="86" rx="10" fill="#26325a" stroke="#7fd0d8" stroke-width="3.5"/>
    <text x="530" y="206" font-size="16" font-weight="bold" fill="#bff0f3" text-anchor="middle">★ ARCADE HUB</text>
    <text x="530" y="228" font-size="10.5" fill="#b9c8e6" text-anchor="middle">Mira · Rockbyte Duel</text>
    <text x="530" y="244" font-size="10.5" fill="#b9c8e6" text-anchor="middle">owner portrait · central anchor</text>
  </g>

  <!-- Cabinet Row -->
  <g>
    <rect x="632" y="180" width="196" height="86" rx="10" fill="#1e2a4a" stroke="#4a6a96" stroke-width="2.5"/>
    <text x="730" y="206" font-size="15" font-weight="bold" fill="#eef0fb" text-anchor="middle">CABINET ROW</text>
    <text x="730" y="228" font-size="10.5" fill="#9fb0d0" text-anchor="middle">Truth Filter · Mr. Byte</text>
    <text x="730" y="244" font-size="10.5" fill="#9fb0d0" text-anchor="middle">Broken High Score · records</text>
  </g>

