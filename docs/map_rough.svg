  <g>
    <rect x="232" y="300" width="196" height="86" rx="10" fill="#1e2a4a" stroke="#4a6a96" stroke-width="2.5"/>
    <text x="330" y="326" font-size="15" font-weight="bold" fill="#eef0fb" text-anchor="middle">PRIZE CORNER</text>
    <text x="330" y="348" font-size="10.5" fill="#9fb0d0" text-anchor="middle">Prize Sort · Pip</text>
    <text x="330" y="364" font-size="10.5" fill="#9fb0d0" text-anchor="middle">blank badge · secret</text>
  </g>

