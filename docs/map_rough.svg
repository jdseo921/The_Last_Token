    <rect x="632" y="300" width="196" height="86" rx="10" fill="#1e2a4a" stroke="#4a6a96" stroke-width="2.5"/>
    <text x="730" y="326" font-size="15" font-weight="bold" fill="#eef0fb" text-anchor="middle">SNACK ALCOVE</text>
    <text x="730" y="348" font-size="10.5" fill="#9fb0d0" text-anchor="middle">Circuit Soda · Vendo</text>
    <text x="730" y="364" font-size="10.5" fill="#9fb0d0" text-anchor="middle">old-staff lore · breather</text>
  </g>

  <!-- Maintenance Hall -->
  <g>
    <rect x="432" y="428" width="196" height="86" rx="10" fill="#2a1830" stroke="#6a3050" stroke-width="2.5"/>
    <text x="530" y="454" font-size="15" font-weight="bold" fill="#f3e0ec" text-anchor="middle">MAINTENANCE HALL</text>
    <text x="530" y="476" font-size="10.5" fill="#c99ab4" text-anchor="middle">Static Run · Sync Door · Gus</text>
    <text x="530" y="492" font-size="10.5" fill="#c99ab4" text-anchor="middle">maintenance note</text>
  </g>

  <!-- Workshop (NEW) -->
  <g>
    <rect x="632" y="428" width="196" height="86" rx="10" fill="#2a1830" stroke="#f2a640" stroke-width="2.5"/>
    <rect x="780" y="434" width="42" height="18" rx="4" fill="#f2a640"/>
    <text x="801" y="447" font-size="11" font-weight="bold" fill="#241400" text-anchor="middle">NEW</text>
    <text x="730" y="454" font-size="15" font-weight="bold" fill="#f3e0ec" text-anchor="middle">WORKSHOP</text>
    <text x="730" y="476" font-size="10.5" fill="#c99ab4" text-anchor="middle">maker's workbench</text>
    <text x="730" y="492" font-size="10.5" fill="#c99ab4" text-anchor="middle">prototype game (opt)</text>
  </g>

  <!-- Staff Corridor -->
  <g>
    <rect x="432" y="548" width="196" height="86" rx="10" fill="#2a1830" stroke="#6a3050" stroke-width="2.5"/>
    <text x="530" y="574" font-size="15" font-weight="bold" fill="#f3e0ec" text-anchor="middle">STAFF CORRIDOR</text>
    <text x="530" y="596" font-size="10.5" fill="#c99ab4" text-anchor="middle">Security Tape · Final Night</text>
    <text x="530" y="612" font-size="10.5" fill="#c99ab4" text-anchor="middle">staff records</text>
  </g>

  <!-- Memory Core (NEW) -->
  <g>
    <rect x="632" y="548" width="196" height="86" rx="10" fill="#2a1830" stroke="#f2a640" stroke-width="2.5"/>
    <rect x="780" y="554" width="42" height="18" rx="4" fill="#f2a640"/>
    <text x="801" y="567" font-size="11" font-weight="bold" fill="#241400" text-anchor="middle">NEW</text>
    <text x="730" y="574" font-size="15" font-weight="bold" fill="#f3e0ec" text-anchor="middle">MEMORY CORE</text>
    <text x="730" y="596" font-size="10.5" fill="#c99ab4" text-anchor="middle">memory banks · late lore</text>
    <text x="730" y="612" font-size="10.5" fill="#c99ab4" text-anchor="middle">the saved memories</text>
  </g>

  <!-- Staff Room (climax) -->
  <g>
    <rect x="432" y="668" width="196" height="86" rx="10" fill="#3a1030" stroke="#e0459e" stroke-width="3.5"/>
    <text x="530" y="694" font-size="15" font-weight="bold" fill="#ffc7e6" text-anchor="middle">★ STAFF ROOM</text>
    <text x="530" y="716" font-size="10.5" fill="#e6a8cc" text-anchor="middle">THE REVEAL · self-conflict</text>
    <text x="530" y="732" font-size="10.5" fill="#e6a8cc" text-anchor="middle">climax</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g>
    <rect x="856" y="180" width="176" height="200" rx="10" fill="#141024" stroke="#2a2444" stroke-width="1.5"/>
    <text x="872" y="206" font-size="13" font-weight="bold" fill="#ffcf6b">LEGEND</text>
    <rect x="872" y="222" width="26" height="16" rx="4" fill="#1e2a4a" stroke="#4a6a96" stroke-width="2"/>
    <text x="908" y="235" font-size="11" fill="#c8d2ea">front of house</text>
    <rect x="872" y="248" width="26" height="16" rx="4" fill="#2a1830" stroke="#6a3050" stroke-width="2"/>
    <text x="908" y="261" font-size="11" fill="#c8d2ea">back of house</text>
    <rect x="872" y="274" width="26" height="16" rx="4" fill="#1e2a4a" stroke="#f2a640" stroke-width="2.5"/>
    <text x="908" y="287" font-size="11" fill="#c8d2ea">NEW room</text>
    <line x1="872" y1="308" x2="898" y2="308" stroke="#4a6a96" stroke-width="3"/>
    <text x="908" y="312" font-size="11" fill="#c8d2ea">walk-through</text>
    <line x1="872" y1="330" x2="898" y2="330" stroke="#ff5a6a" stroke-width="3" stroke-dasharray="6 5"/>
    <text x="908" y="334" font-size="11" fill="#c8d2ea">story gate</text>
    <text x="872" y="360" font-size="10" fill="#8f9ec0">★ = key story room</text>
  </g>

  <text x="40" y="778" font-size="10.5" fill="#6f7ba0">Front loop: Hub → Cabinet Row → Snack Alcove → Prize Corner → Party Room → Hub  (no dead-ends). Snack entry keeps its lying_cabinets gate.</text>
</svg>
