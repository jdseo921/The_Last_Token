<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f38"/>
      <stop offset="100%" stop-color="#0b0620"/>
    </linearGradient>
    <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fd0d8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fd0d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0459e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0459e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="440" fill="url(#bg)"/>

  <!-- perspective floor grid -->
  <g stroke="#2a6a86" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="0" y1="250" x2="640" y2="250"/>
    <line x1="-40" y1="300" x2="680" y2="300"/>
    <line x1="-120" y1="360" x2="760" y2="360"/>
    <line x1="-240" y1="430" x2="880" y2="430"/>
  </g>
  <g stroke="#2a6a86" stroke-opacity="0.28" stroke-width="1.5">
    <line x1="320" y1="250" x2="320" y2="440"/>
    <line x1="250" y1="250" x2="150" y2="440"/>
    <line x1="390" y1="250" x2="490" y2="440"/>
    <line x1="180" y1="250" x2="-40" y2="440"/>
    <line x1="460" y1="250" x2="680" y2="440"/>
  </g>

  <!-- side glows -->
  <ellipse cx="150" cy="300" rx="170" ry="120" fill="url(#glowL)"/>
  <ellipse cx="490" cy="300" rx="170" ry="120" fill="url(#glowR)"/>

  <!-- left dais (player) -->
  <g>
    <ellipse cx="150" cy="322" rx="112" ry="30" fill="#123040"/>
    <ellipse cx="150" cy="318" rx="112" ry="30" fill="none" stroke="#3fd0d8" stroke-width="3"/>
    <ellipse cx="150" cy="318" rx="96" ry="24" fill="none" stroke="#7fe8ee" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>
  <!-- right dais (Cabinet 07) -->
  <g>
    <ellipse cx="490" cy="322" rx="112" ry="30" fill="#3a1030"/>
    <ellipse cx="490" cy="318" rx="112" ry="30" fill="none" stroke="#e0459e" stroke-width="3"/>
    <ellipse cx="490" cy="318" rx="96" ry="24" fill="none" stroke="#ff8ac6" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>

  <!-- center energy divider -->
  <g>
    <line x1="320" y1="96" x2="320" y2="300" stroke="#ffcf6b" stroke-opacity="0.35" stroke-width="6"/>
    <line x1="320" y1="96" x2="320" y2="300" stroke="#ffe3a3" stroke-width="2"/>
    <path d="M320 176 L338 200 L320 224 L302 200 Z" fill="#1a0f38" stroke="#ffcf6b" stroke-width="3"/>
    <path d="M320 186 L330 200 L320 214 L310 200 Z" fill="#ffcf6b"/>
  </g>

  <!-- duelist header panels -->
  <g>
    <rect x="40" y="40" width="200" height="44" rx="8" fill="#101a34" stroke="#3fd0d8" stroke-width="2.5"/>
    <rect x="54" y="54" width="24" height="16" rx="3" fill="#3fd0d8"/>
    <rect x="88" y="56" width="130" height="5" rx="2" fill="#3fd0d8" opacity="0.8"/>
    <rect x="88" y="66" width="90" height="4" rx="2" fill="#3fd0d8" opacity="0.45"/>
  </g>
  <g>
    <rect x="400" y="40" width="200" height="44" rx="8" fill="#241028" stroke="#e0459e" stroke-width="2.5"/>
    <rect x="562" y="54" width="24" height="16" rx="3" fill="#e0459e"/>
    <rect x="422" y="56" width="130" height="5" rx="2" fill="#e0459e" opacity="0.8"/>
    <rect x="462" y="66" width="90" height="4" rx="2" fill="#e0459e" opacity="0.45"/>
  </g>

  <!-- ambient orbs -->
  <circle cx="96" cy="150" r="3" fill="#7fe8ee" opacity="0.6"/>
  <circle cx="548" cy="170" r="3" fill="#ff8ac6" opacity="0.6"/>
  <circle cx="230" cy="120" r="2" fill="#ffe3a3" opacity="0.5"/>
  <circle cx="430" cy="130" r="2" fill="#ffe3a3" opacity="0.5"/>
</svg>
