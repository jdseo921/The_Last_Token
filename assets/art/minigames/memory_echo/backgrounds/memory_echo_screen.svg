<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="me_bg" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    <radialGradient id="me_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fd0d8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3fd0d8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="440" fill="url(#me_bg)"/>

  <!-- echo rings -->
  <g fill="none">
    <circle cx="320" cy="210" r="60" stroke="#3fd0d8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="320" cy="210" r="110" stroke="#3f9fd8" stroke-width="1.2" opacity="0.35"/>
    <circle cx="320" cy="210" r="164" stroke="#7a4fd8" stroke-width="1" opacity="0.25"/>
    <circle cx="320" cy="210" r="220" stroke="#e0459e" stroke-width="1" opacity="0.16"/>
  </g>
  <ellipse cx="320" cy="210" rx="150" ry="130" fill="url(#me_core)"/>

  <!-- fragment shards near edges -->
  <g stroke-width="1.5" fill-opacity="0.16">
    <rect x="60" y="70" width="26" height="26" fill="#3fd0d8" stroke="#7fe8ee" transform="rotate(18 73 83)"/>
    <rect x="548" y="96" width="22" height="22" fill="#e0459e" stroke="#ff8ac6" transform="rotate(-22 559 107)"/>
    <rect x="92" y="330" width="20" height="20" fill="#7a4fd8" stroke="#b98cff" transform="rotate(30 102 340)"/>
    <rect x="540" y="330" width="24" height="24" fill="#3fd0d8" stroke="#7fe8ee" transform="rotate(-14 552 342)"/>
    <rect x="300" y="40" width="18" height="18" fill="#e0459e" stroke="#ff8ac6" transform="rotate(24 309 49)"/>
  </g>

  <!-- faint glitch bands -->
  <rect x="0" y="128" width="640" height="4" fill="#3fd0d8" opacity="0.06"/>
  <rect x="0" y="300" width="640" height="4" fill="#e0459e" opacity="0.06"/>

  <!-- drifting motes -->
  <g fill="#7fe8ee">
    <circle cx="180" cy="150" r="2" opacity="0.5"/>
    <circle cx="470" cy="180" r="2" opacity="0.45"/>
    <circle cx="240" cy="300" r="1.6" opacity="0.4"/>
    <circle cx="410" cy="290" r="1.6" opacity="0.4"/>
  </g>
</svg>
