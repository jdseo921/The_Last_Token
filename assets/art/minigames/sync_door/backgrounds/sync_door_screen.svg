<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <linearGradient id="sd_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101a30"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="sd_seam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2c8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffcf6b" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="640" height="440" fill="url(#sd_bg)"/>

  <!-- floor grid -->
  <g stroke="#2a3f66" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="0" y1="360" x2="640" y2="360"/>
    <line x1="-60" y1="410" x2="700" y2="410"/>
    <line x1="320" y1="360" x2="320" y2="440"/>
    <line x1="200" y1="360" x2="120" y2="440"/>
    <line x1="440" y1="360" x2="520" y2="440"/>
  </g>

  <!-- the staff door -->
  <g>
    <rect x="238" y="70" width="164" height="290" rx="6" fill="#0b1120" stroke="#5f7bb0" stroke-width="3"/>
    <rect x="250" y="82" width="140" height="266" rx="4" fill="#0e1830" stroke="#3a4f7a" stroke-width="1.5"/>
    <rect x="317" y="82" width="6" height="266" fill="url(#sd_seam)"/>
    <rect x="300" y="196" width="40" height="30" rx="4" fill="#241a10" stroke="#ffcf6b" stroke-width="2.5"/>
    <circle cx="320" cy="211" r="7" fill="#ffcf6b" opacity="0.9"/>
  </g>

  <!-- left signal wave (cyan) -->
  <path d="M20 150 q26 -34 52 0 q26 34 52 0 q26 -34 52 0 q26 34 52 0" fill="none" stroke="#3fd0d8" stroke-width="3" stroke-opacity="0.9"/>
  <!-- right signal wave (magenta) -->
  <path d="M436 150 q26 -34 52 0 q26 34 52 0 q26 -34 52 0 q26 34 52 0" fill="none" stroke="#e0459e" stroke-width="3" stroke-opacity="0.9"/>

  <!-- alignment meter (top) -->
  <g>
    <rect x="250" y="34" width="140" height="14" rx="7" fill="#0b1120" stroke="#5f7bb0" stroke-width="1.5"/>
    <rect x="254" y="38" width="60" height="6" rx="3" fill="#3fd0d8" opacity="0.85"/>
    <rect x="326" y="38" width="60" height="6" rx="3" fill="#e0459e" opacity="0.85"/>
    <circle cx="320" cy="41" r="5" fill="#ffcf6b"/>
  </g>

  <!-- side glows -->
  <circle cx="72" cy="150" r="4" fill="#3fd0d8" opacity="0.6"/>
  <circle cx="568" cy="150" r="4" fill="#e0459e" opacity="0.6"/>
  <circle cx="150" cy="300" r="2.5" fill="#7fe8ee" opacity="0.5"/>
  <circle cx="490" cy="300" r="2.5" fill="#ff8ac6" opacity="0.5"/>
</svg>
