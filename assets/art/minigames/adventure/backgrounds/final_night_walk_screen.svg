<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <linearGradient id="fnw_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160e2e"/>
      <stop offset="100%" stop-color="#070512"/>
    </linearGradient>
    <radialGradient id="fnw_door" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a040" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0a040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="440" fill="url(#fnw_bg)"/>

  <!-- dim cabinet silhouettes receding along the top -->
  <g>
    <rect x="30" y="40" width="44" height="80" rx="4" fill="#1c1440" stroke="#3a2f6a" stroke-width="1.5"/>
    <rect x="38" y="50" width="28" height="24" rx="2" fill="#241a55" stroke="#5a3fa0" stroke-width="1"/>
    <rect x="86" y="48" width="40" height="72" rx="4" fill="#181038" stroke="#3a2f6a" stroke-width="1.2"/>
    <rect x="93" y="57" width="26" height="22" rx="2" fill="#201650" stroke="#5a3fa0" stroke-width="1"/>
    <rect x="560" y="40" width="44" height="80" rx="4" fill="#1c1440" stroke="#3a2f6a" stroke-width="1.5"/>
    <rect x="568" y="50" width="28" height="24" rx="2" fill="#241a55" stroke="#5a3fa0" stroke-width="1"/>
    <rect x="516" y="48" width="40" height="72" rx="4" fill="#181038" stroke="#3a2f6a" stroke-width="1.2"/>
    <rect x="523" y="57" width="26" height="22" rx="2" fill="#201650" stroke="#5a3fa0" stroke-width="1"/>
  </g>

  <!-- staff door glow (right, matches goal) -->
  <ellipse cx="580" cy="260" rx="110" ry="130" fill="url(#fnw_door)"/>
  <rect x="540" y="168" width="74" height="180" rx="4" fill="#120c26" stroke="#f0a040" stroke-width="2.5"/>
  <line x1="577" y1="176" x2="577" y2="340" stroke="#f0a040" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="566" y="250" width="22" height="18" rx="3" fill="#2a1a10" stroke="#f0a040" stroke-width="1.5"/>

  <!-- footstep trail (a dotted receding path) -->
  <g fill="#b98cff">
    <ellipse cx="120" cy="404" rx="7" ry="4" opacity="0.5"/>
    <ellipse cx="170" cy="388" rx="6" ry="3.5" opacity="0.42"/>
    <ellipse cx="214" cy="374" rx="5" ry="3" opacity="0.34"/>
    <ellipse cx="252" cy="362" rx="4" ry="2.4" opacity="0.26"/>
    <ellipse cx="284" cy="352" rx="3.2" ry="2" opacity="0.2"/>
  </g>
  <!-- a second signal echo (magenta), half a beat behind -->
  <g fill="#e0459e">
    <ellipse cx="140" cy="410" rx="6" ry="3.5" opacity="0.3"/>
    <ellipse cx="188" cy="394" rx="5" ry="3" opacity="0.24"/>
    <ellipse cx="230" cy="380" rx="4" ry="2.6" opacity="0.18"/>
  </g>

  <circle cx="330" cy="70" r="2" fill="#b98cff" opacity="0.5"/>
  <circle cx="420" cy="60" r="2" fill="#ff8ac6" opacity="0.45"/>
</svg>
