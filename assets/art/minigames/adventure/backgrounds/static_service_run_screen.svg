<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <linearGradient id="ssr_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06201f"/>
      <stop offset="100%" stop-color="#020a0c"/>
    </linearGradient>
    <radialGradient id="ssr_brk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fe08a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fe08a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="440" fill="url(#ssr_bg)"/>

  <!-- conduit pipes along the top -->
  <g stroke="#0f5a52" stroke-width="6" stroke-opacity="0.6" fill="none">
    <line x1="0" y1="16" x2="640" y2="16"/>
    <line x1="0" y1="30" x2="640" y2="30"/>
  </g>
  <g fill="#1a7a6e">
    <rect x="120" y="10" width="10" height="26" rx="2"/>
    <rect x="360" y="10" width="10" height="26" rx="2"/>
    <rect x="540" y="10" width="10" height="26" rx="2"/>
  </g>

  <!-- left vertical conduit -->
  <g stroke="#0f5a52" stroke-width="5" stroke-opacity="0.5" fill="none">
    <line x1="10" y1="40" x2="10" y2="430"/>
    <line x1="20" y1="40" x2="20" y2="430"/>
  </g>

  <!-- warning stripes (top-right) -->
  <rect x="470" y="46" width="150" height="20" fill="#0a1512"/>
  <g fill="#f0b040" opacity="0.85">
    <polygon points="474,64 486,48 500,48 488,64"/>
    <polygon points="502,64 514,48 528,48 516,64"/>
    <polygon points="530,64 542,48 556,48 544,64"/>
    <polygon points="558,64 570,48 584,48 572,64"/>
    <polygon points="586,64 598,48 612,48 600,64"/>
  </g>

  <!-- breaker panel (right side, matches goal) -->
  <ellipse cx="560" cy="250" rx="120" ry="120" fill="url(#ssr_brk)"/>
  <rect x="516" y="150" width="96" height="150" rx="6" fill="#07281f" stroke="#3fe08a" stroke-width="2.5"/>
  <g fill="#0c3a2c" stroke="#3fe08a" stroke-width="1.2">
    <rect x="528" y="164" width="30" height="18" rx="2"/>
    <rect x="570" y="164" width="30" height="18" rx="2"/>
    <rect x="528" y="192" width="30" height="18" rx="2"/>
    <rect x="570" y="192" width="30" height="18" rx="2"/>
    <rect x="528" y="220" width="30" height="18" rx="2"/>
    <rect x="570" y="220" width="30" height="18" rx="2"/>
  </g>
  <circle cx="543" cy="262" r="5" fill="#f0b040"/>
  <circle cx="585" cy="262" r="5" fill="#3fe08a"/>

  <!-- faint electrical arcs (top area) -->
  <g stroke="#5cf0c0" stroke-width="1.5" stroke-opacity="0.5" fill="none">
    <path d="M180 70 l14 -10 l-6 16 l16 -6"/>
    <path d="M300 82 l12 -12 l-4 18 l14 -8"/>
  </g>

  <g fill="#1a7a6e">
    <circle cx="34" cy="52" r="4"/><circle cx="34" cy="420" r="4"/>
  </g>
</svg>
