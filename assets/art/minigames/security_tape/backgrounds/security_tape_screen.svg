<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440">
  <defs>
    <linearGradient id="st_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1810"/>
      <stop offset="100%" stop-color="#03080a"/>
    </linearGradient>
    <radialGradient id="st_glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3fd88a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3fd88a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="440" fill="url(#st_bg)"/>
  <rect width="640" height="440" fill="url(#st_glow)"/>

  <!-- CCTV monitor bank -->
  <g fill="#04140d" stroke="#2f8a5a" stroke-width="2">
    <rect x="40" y="60" width="150" height="96" rx="4"/>
    <rect x="245" y="60" width="150" height="96" rx="4"/>
    <rect x="450" y="60" width="150" height="96" rx="4"/>
    <rect x="40" y="300" width="150" height="96" rx="4"/>
    <rect x="450" y="300" width="150" height="96" rx="4"/>
  </g>
  <g stroke="#3fd88a" stroke-opacity="0.4" stroke-width="1">
    <line x1="52" y1="84" x2="178" y2="84"/><line x1="52" y1="100" x2="150" y2="100"/><line x1="52" y1="116" x2="168" y2="116"/><line x1="52" y1="132" x2="120" y2="132"/>
    <line x1="257" y1="84" x2="383" y2="84"/><line x1="257" y1="100" x2="340" y2="100"/><line x1="257" y1="116" x2="372" y2="116"/>
    <line x1="462" y1="84" x2="588" y2="84"/><line x1="462" y1="100" x2="560" y2="100"/><line x1="462" y1="116" x2="580" y2="116"/><line x1="462" y1="132" x2="520" y2="132"/>
    <line x1="52" y1="324" x2="178" y2="324"/><line x1="52" y1="340" x2="150" y2="340"/><line x1="52" y1="356" x2="168" y2="356"/>
    <line x1="462" y1="324" x2="588" y2="324"/><line x1="462" y1="340" x2="540" y2="340"/><line x1="462" y1="356" x2="576" y2="356"/>
  </g>

  <!-- tape reels (center) -->
  <g>
    <circle cx="285" cy="212" r="26" fill="#06170f" stroke="#3fd0d8" stroke-width="2.5"/>
    <circle cx="285" cy="212" r="8" fill="#3fd0d8" opacity="0.8"/>
    <g stroke="#3fd0d8" stroke-width="1.5" stroke-opacity="0.6"><line x1="285" y1="188" x2="285" y2="236"/><line x1="261" y1="212" x2="309" y2="212"/><line x1="268" y1="195" x2="302" y2="229"/><line x1="302" y1="195" x2="268" y2="229"/></g>
    <circle cx="355" cy="212" r="26" fill="#06170f" stroke="#3fd0d8" stroke-width="2.5"/>
    <circle cx="355" cy="212" r="8" fill="#3fd0d8" opacity="0.8"/>
    <g stroke="#3fd0d8" stroke-width="1.5" stroke-opacity="0.6"><line x1="355" y1="188" x2="355" y2="236"/><line x1="331" y1="212" x2="379" y2="212"/><line x1="338" y1="195" x2="372" y2="229"/><line x1="372" y1="195" x2="338" y2="229"/></g>
    <line x1="285" y1="238" x2="355" y2="238" stroke="#3fd0d8" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- REC dot -->
  <circle cx="596" cy="30" r="7" fill="#ff4d5e"/>
  <circle cx="596" cy="30" r="12" fill="none" stroke="#ff4d5e" stroke-opacity="0.4" stroke-width="2"/>

  <!-- timecode ticks -->
  <g stroke="#3fd88a" stroke-opacity="0.5" stroke-width="2">
    <line x1="220" y1="418" x2="220" y2="428"/><line x1="240" y1="420" x2="240" y2="428"/><line x1="260" y1="420" x2="260" y2="428"/><line x1="280" y1="418" x2="280" y2="428"/><line x1="300" y1="420" x2="300" y2="428"/><line x1="320" y1="418" x2="320" y2="428"/><line x1="340" y1="420" x2="340" y2="428"/><line x1="360" y1="420" x2="360" y2="428"/><line x1="380" y1="418" x2="380" y2="428"/><line x1="400" y1="420" x2="400" y2="428"/><line x1="420" y1="418" x2="420" y2="428"/>
  </g>

  <!-- VHS distortion bands -->
  <rect x="0" y="250" width="640" height="6" fill="#7fffd0" opacity="0.05"/>
  <rect x="0" y="366" width="640" height="3" fill="#ffffff" opacity="0.04"/>
</svg>
